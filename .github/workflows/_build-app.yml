# =============================================================================
# REUSABLE: Build Application
# =============================================================================
# Builds a specific application from the monorepo.
# Supports different test runners (vitest, jest, playwright).
#
# Usage:
#   uses: ./.github/workflows/_build-app.yml
#   with:
#     app: 'gw-spaces'
#     test-runner: 'vitest'
#     run-e2e: true
#
# =============================================================================

name: _Build Application

on:
  workflow_call:
    inputs:
      app:
        description: 'Application name (without @greenways/ prefix)'
        type: string
        required: true
      node-version:
        description: 'Node.js version'
        type: string
        default: '20'
      main-dir:
        description: 'Path to main directory'
        type: string
        default: 'main'
      test-runner:
        description: 'Test runner (vitest, jest, or none)'
        type: string
        default: 'vitest'
      run-unit-tests:
        description: 'Run unit tests'
        type: boolean
        default: true
      run-e2e:
        description: 'Run E2E tests'
        type: boolean
        default: false
      e2e-runner:
        description: 'E2E test runner (playwright or none)'
        type: string
        default: 'playwright'
    secrets:
      NEXT_PUBLIC_SUPABASE_URL:
        required: false
      NEXT_PUBLIC_SUPABASE_ANON_KEY:
        required: false
      SUPABASE_SERVICE_ROLE_KEY:
        required: false
      TEST_USER_EMAIL:
        required: false
      TEST_USER_PASSWORD:
        required: false

jobs:
  build-app:
    name: Build & Test ${{ inputs.app }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout gw-v2 repository
        uses: actions/checkout@v4
        with:
          repository: greenways-ai/v2
          token: ${{ secrets.GH_TOKEN }}
          submodules: recursive

      - name: Setup Node.js ${{ inputs.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'yarn'
          cache-dependency-path: ${{ inputs.main-dir }}/yarn.lock

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        working-directory: ${{ inputs.main-dir }}
        run: yarn install --frozen-lockfile

      - name: Restore Package Builds
        uses: actions/cache@v4
        with:
          path: |
            ${{ inputs.main-dir }}/packages/**/dist
            !${{ inputs.main-dir }}/packages/**/node_modules
          key: packages-dist-${{ github.sha }}
          restore-keys: |
            packages-dist-

      - name: Build Application
        working-directory: ${{ inputs.main-dir }}
        run: yarn turbo build --filter=@greenways/${{ inputs.app }}
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Run Unit Tests (${{ inputs.test-runner }})
        if: inputs.run-unit-tests && inputs.test-runner != 'none'
        working-directory: ${{ inputs.main-dir }}/apps/${{ inputs.app }}
        run: |
          if [ "${{ inputs.test-runner }}" == "vitest" ]; then
            yarn test --run
          elif [ "${{ inputs.test-runner }}" == "jest" ]; then
            yarn test
          fi
        continue-on-error: true
        env:
          CI: true

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ inputs.app }}-build
          path: |
            ${{ inputs.main-dir }}/apps/${{ inputs.app }}/.next
          retention-days: 1

  e2e-tests:
    name: E2E Tests (${{ inputs.app }})
    runs-on: ubuntu-latest
    needs: build-app
    if: inputs.run-e2e && inputs.e2e-runner != 'none'
    timeout-minutes: 30

    steps:
      - name: Checkout gw-v2 repository
        uses: actions/checkout@v4
        with:
          repository: greenways-ai/v2
          token: ${{ secrets.GH_TOKEN }}
          submodules: recursive

      - name: Setup Node.js ${{ inputs.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'yarn'
          cache-dependency-path: ${{ inputs.main-dir }}/yarn.lock

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        working-directory: ${{ inputs.main-dir }}
        run: yarn install --frozen-lockfile

      - name: Install Playwright browsers
        if: inputs.e2e-runner == 'playwright'
        working-directory: ${{ inputs.main-dir }}
        run: yarn playwright install --with-deps chromium

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: app-${{ inputs.app }}-build
          path: ${{ inputs.main-dir }}/apps/${{ inputs.app }}/.next

      - name: Run E2E Tests
        working-directory: ${{ inputs.main-dir }}
        run: yarn turbo test:e2e --filter=@greenways/${{ inputs.app }}
        env:
          CI: true
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

      - name: Upload E2E Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ inputs.app }}-e2e-results
          path: |
            ${{ inputs.main-dir }}/apps/${{ inputs.app }}/playwright-report/
            ${{ inputs.main-dir }}/apps/${{ inputs.app }}/test-results/
          retention-days: 14
