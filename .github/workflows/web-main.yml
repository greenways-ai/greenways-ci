name: Publish Web Main (Test)

# Controls when the workflow will run
on:
  repository_dispatch:
    types: [ui-changed]
  workflow_dispatch:

jobs:
  publish-web-main-netlify:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out gw-v2
      - name: Checkout gw-v2
        uses: actions/checkout@v4
        with:
          repository: greenways-ai/v2
          token: ${{ secrets.GH_TOKEN }} # Personal Access Token with repo write access
          submodules: recursive
          
      - name: Show full commit SHA
        run: git rev-parse HEAD

      # 2. Install Node and Yarn
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack and Check Versions
        run: |
          corepack enable
          node -v
          yarn --version
          ls -al

      - name: Install dependencies
        working-directory: src-js/greenways
        run: yarn install --frozen-lockfile
        
      - name: Copy .env.local for test deployment
        working-directory: src-js/greenways/apps/gw.spaces
        run: |
          # Copy staging/test environment
          cp .env.local.example .env.local || true
          # Or use dot-secrets if available
          cp ../../../cache/dot-secrets/spaces/staging/.env .env.local 2>/dev/null || true

      - name: Build Next.js app
        working-directory: src-js/greenways/apps/gw.spaces
        run: yarn build

      - name: Deploy to Netlify (Test)
        working-directory: src-js/greenways/apps/gw.spaces
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_WEB_TEST_ID }}
        run: |
          npx netlify-cli deploy --prod --dir=.next --site=$NETLIFY_SITE_ID
