name: Publish Web Main

# Controls when the workflow will run
on:
  repository_dispatch:
    types: [ui-changed, ui-changed-prod]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  publish-web-netlify:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out gw-v2
      - name: Checkout gw-v2
        uses: actions/checkout@v4
        with:
          repository: greenways-ai/v2
          token: ${{ secrets.GH_TOKEN }}
          submodules: recursive
          
      - name: Show full commit SHA
        run: git rev-parse HEAD

      # 2. Determine environment
      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            if [[ "${{ github.event.action }}" == "ui-changed-prod" ]]; then
              echo "environment=prod" >> $GITHUB_OUTPUT
              echo "site_id=${{ secrets.NETLIFY_WEB_PROD_ID }}" >> $GITHUB_OUTPUT
            else
              echo "environment=staging" >> $GITHUB_OUTPUT
              echo "site_id=${{ secrets.NETLIFY_WEB_TEST_ID }}" >> $GITHUB_OUTPUT
            fi
          else
            # workflow_dispatch
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
            if [[ "${{ github.event.inputs.environment }}" == "production" ]]; then
              echo "site_id=${{ secrets.NETLIFY_WEB_PROD_ID }}" >> $GITHUB_OUTPUT
            else
              echo "site_id=${{ secrets.NETLIFY_WEB_TEST_ID }}" >> $GITHUB_OUTPUT
            fi
          fi

      # 3. Install Node and Yarn
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      # 4. Run deployment script
      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_TOKEN }}
          NETLIFY_SITE_ID: ${{ steps.env.outputs.site_id }}
        run: |
          ./scripts/deploy-netlify.sh ${{ steps.env.outputs.environment }}
