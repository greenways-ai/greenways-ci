name: Publish Web Prod

# Controls when the workflow will run
on:
  repository_dispatch:
    types: [ui-changed-prod ui-changed]
  workflow_dispatch:

jobs:
  publish-web-prod-netlify:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out gw-v2
      - name: Checkout gw-v2
        uses: actions/checkout@v4
        with:
          repository: greenways-ai/v2
          branch: main
          token: ${{ secrets.GH_TOKEN }}
          submodules: recursive
          
      - name: Show full commit SHA
        run: git rev-parse HEAD

      # 2. Install Node and Yarn
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        working-directory: src-js/greenways
        run: yarn install --frozen-lockfile
        
      - name: Copy .env.local for production deployment
        working-directory: src-js/greenways/apps/gw.spaces
        run: |
          cp ../../../cache/dot-secrets/spaces/prod/.env .env.local 2>/dev/null || true

      - name: Build and Deploy to Netlify (Production)
        working-directory: src-js/greenways/apps/gw.spaces
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_WEB_PROD_ID }}
        run: |
          npx netlify-cli deploy --prod --build --site=$NETLIFY_SITE_ID
