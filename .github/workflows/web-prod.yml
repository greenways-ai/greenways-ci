name: Publish Web Prod

# Controls when the workflow will run
on:
  repository_dispatch:
    types: [ui-changed-prod ui-changed]
  workflow_dispatch:

jobs:
  publish-web-prod-netlify:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out gw-v2
      - name: Checkout gw-v2
        uses: actions/checkout@v4
        with:
          repository: greenways-ai/gw-v2
          branch: main
          token: ${{ secrets.GH_TOKEN }} # Personal Access Token with repo write access
          submodules: recursive
          
      - name: Show full commit SHA
        run: git rev-parse HEAD

      # 2. Install Node and Yarn
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack and Check Versions
        run: |
          corepack enable
          node -v
          yarn --version
          ls -al

      - name: Install dependencies
        working-directory: src-js/greenways
        run: yarn install --frozen-lockfile
        
      - name: Copy .env.local for production deployment
        working-directory: src-js/greenways/apps/gw.spaces
        run: |
          # Copy production environment
          cp ../../../cache/dot-secrets/spaces/prod/.env .env.local 2>/dev/null || true

      - name: Build Next.js app
        working-directory: src-js/greenways/apps/gw.spaces
        run: yarn build

      - name: Deploy to Netlify (Production)
        working-directory: src-js/greenways/apps/gw.spaces
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_TOKEN }}
        run: |
          yarn netlify deploy --prod --site=${{ secrets.NETLIFY_WEB_PROD_ID }}
